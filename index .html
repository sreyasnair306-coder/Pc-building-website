<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON//BUILD — Cyberpunk PC Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--nc:#00f5ff;--np:#ff006e;--ny:#ffd60a;--ng:#39ff14;--npurp:#bf5fff;
  --bg:#030610;--panel:#080f1f;--card:#0a1428;--bd:rgba(0,245,255,0.12);
  --t1:#e0f0ff;--t2:#7090b0;--t3:#2a4060;--gc:rgba(0,245,255,0.05);
  --gC:0 0 18px rgba(0,245,255,0.45),0 0 50px rgba(0,245,255,0.12);
  --gP:0 0 18px rgba(255,0,110,0.45);--gY:0 0 18px rgba(255,214,10,0.45);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;cursor:crosshair;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--gc) 1px,transparent 1px),linear-gradient(90deg,var(--gc) 1px,transparent 1px);
  background-size:44px 44px;z-index:0;pointer-events:none;animation:gp 10s ease-in-out infinite;}
@keyframes gp{0%,100%{opacity:1;}50%{opacity:.3;}}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  z-index:9998;pointer-events:none;}
.crn{position:fixed;width:64px;height:64px;z-index:200;pointer-events:none;}
.crn.tl{top:0;left:0;border-top:2px solid var(--nc);border-left:2px solid var(--nc);}
.crn.tr{top:0;right:0;border-top:2px solid var(--np);border-right:2px solid var(--np);}
.crn.bl{bottom:0;left:0;border-bottom:2px solid var(--np);border-left:2px solid var(--np);}
.crn.br{bottom:0;right:0;border-bottom:2px solid var(--nc);border-right:2px solid var(--nc);}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:900;height:62px;padding:0 28px;display:flex;align-items:center;gap:14px;
  background:rgba(3,6,16,.95);border-bottom:1px solid var(--bd);backdrop-filter:blur(14px);}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;letter-spacing:3px;flex-shrink:0;
  background:linear-gradient(135deg,var(--nc),var(--np));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(0,245,255,.7));animation:lf 7s ease-in-out infinite;}
.logo sub{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;
  -webkit-text-fill-color:var(--t2);filter:none;display:block;}
@keyframes lf{0%,88%,100%{filter:drop-shadow(0 0 10px rgba(0,245,255,.7));}
  90%,92%{filter:drop-shadow(0 0 18px rgba(255,0,110,.9));}}

/* Currency */
.curr{display:flex;align-items:center;gap:6px;background:rgba(0,245,255,.03);
  border:1px solid var(--bd);padding:5px 12px;flex-shrink:0;}
.curr label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t2);}
.cbtn{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;
  padding:4px 11px;border:1px solid transparent;background:transparent;cursor:pointer;
  transition:all .2s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.cbtn.usd{color:var(--ny);border-color:rgba(255,214,10,.25);}
.cbtn.usd.on{background:rgba(255,214,10,.1);border-color:var(--ny);box-shadow:var(--gY);}
.cbtn.inr{color:#ff9933;border-color:rgba(255,153,51,.25);}
.cbtn.inr.on{background:rgba(255,153,51,.1);border-color:#ff9933;box-shadow:0 0 14px rgba(255,153,51,.45);}
.cbtn.eur{color:#4af;border-color:rgba(68,170,255,.25);}
.cbtn.eur.on{background:rgba(68,170,255,.1);border-color:#4af;}
.cbtn.gbp{color:#a8f;border-color:rgba(170,136,255,.25);}
.cbtn.gbp.on{background:rgba(170,136,255,.1);border-color:#a8f;}
.cbtn.jpy{color:#fa8;border-color:rgba(255,170,136,.25);}
.cbtn.jpy.on{background:rgba(255,170,136,.1);border-color:#fa8;}

.hstats{display:flex;gap:20px;margin-left:auto;flex-shrink:0;}
.hstat{text-align:right;font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--t2);line-height:1.4;}
.hstat .v{display:block;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;}
.hstat .vc{color:var(--nc);text-shadow:var(--gC);}
.hstat .vp{color:var(--np);text-shadow:var(--gP);}
.hstat .vg{color:var(--ng);text-shadow:0 0 10px var(--ng);}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;display:grid;grid-template-columns:1fr 355px;min-height:calc(100vh - 62px);}

/* ── LEFT ── */
.left{padding:22px 26px;border-right:1px solid rgba(0,245,255,.08);}
.pt{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--nc);
  text-shadow:var(--gC);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.pt::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,245,255,.3),transparent);}

/* Cats */
.cats{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.ctab{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:5px 11px;
  border:1px solid rgba(0,245,255,.14);background:transparent;color:var(--t2);cursor:pointer;
  transition:all .2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);text-transform:uppercase;}
.ctab:hover,.ctab.on{border-color:var(--nc);color:var(--nc);background:rgba(0,245,255,.06);}

/* Filters */
.frow{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
.fi{background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.16);color:var(--t1);
  font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 12px;outline:none;transition:all .3s;}
.fi:focus{border-color:var(--nc);}
.fi::placeholder{color:var(--t3);}
select.fi{cursor:pointer;}
.srch{flex:1;min-width:180px;position:relative;}
.srch .fi{width:100%;padding-right:36px;}
.srch .si{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--nc);font-size:15px;}

.vt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.rcnt{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t2);}
.rcnt b{color:var(--nc);}
.vbts{display:flex;gap:5px;}
.vbt{background:transparent;border:1px solid rgba(0,245,255,.16);color:var(--t2);
  padding:4px 9px;cursor:pointer;font-size:12px;transition:all .2s;}
.vbt.on{border-color:var(--nc);color:var(--nc);background:rgba(0,245,255,.06);}

/* Grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;
  max-height:calc(100vh - 290px);overflow-y:auto;padding-right:4px;}
.pgrid.lv{grid-template-columns:1fr;}
.pgrid::-webkit-scrollbar{width:3px;}
.pgrid::-webkit-scrollbar-thumb{background:var(--nc);}

/* Card */
.pcard{background:var(--card);border:1px solid rgba(0,245,255,.08);position:relative;cursor:pointer;
  transition:all .25s;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 13px) 0,100% 13px,100% 100%,13px 100%,0 calc(100% - 13px));
  animation:cIn .35s ease both;}
@keyframes cIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.pcard:hover{border-color:rgba(0,245,255,.38);box-shadow:0 0 22px rgba(0,245,255,.1);transform:translateY(-2px);}
.pcard.sel{border-color:var(--np);background:rgba(255,0,110,.04);box-shadow:0 0 22px rgba(255,0,110,.16);}
.pcard.sel::after{content:'✓ IN BUILD';position:absolute;top:8px;right:8px;
  font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--np);letter-spacing:2px;}

.piw{position:relative;height:150px;background:linear-gradient(135deg,#060e1e,#0a1428);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border-bottom:1px solid rgba(0,245,255,.06);}
.piw::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,245,255,.04) 0%,transparent 70%);}
.pimg{width:100%;height:100%;object-fit:contain;padding:16px;transition:transform .4s ease;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.6));}
.pcard:hover .pimg{transform:scale(1.07);}
.piph{font-size:44px;opacity:.3;user-select:none;}
.tbadge{position:absolute;top:7px;left:7px;font-family:'Orbitron',monospace;font-size:7px;font-weight:900;padding:2px 7px;letter-spacing:2px;}
.t-ultra{background:linear-gradient(135deg,#ff006e,#a0003e);color:#fff;}
.t-high{background:linear-gradient(135deg,#00f5ff,#006080);color:#000;}
.t-mid{background:linear-gradient(135deg,#ffd60a,#806000);color:#000;}
.t-entry{background:rgba(255,255,255,.08);color:var(--t2);border:1px solid rgba(255,255,255,.1);}
.sdot{position:absolute;bottom:7px;right:7px;font-family:'Share Tech Mono',monospace;font-size:7px;
  display:flex;align-items:center;gap:4px;color:var(--t2);background:rgba(3,6,16,.85);padding:2px 6px;}
.sdot span{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0;}
.s-in{background:var(--ng);box-shadow:0 0 5px var(--ng);animation:blink 2s ease-in-out infinite;}
.s-low{background:var(--ny);box-shadow:0 0 5px var(--ny);animation:blink .7s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

.pbody{padding:10px 12px;}
.pbrand{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--nc);
  text-shadow:var(--gC);text-transform:uppercase;margin-bottom:3px;}
.pname{font-family:'Orbitron',monospace;font-size:11px;font-weight:600;line-height:1.3;margin-bottom:6px;}
.prating{font-size:9px;color:var(--ny);margin-bottom:5px;}
.pspecs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.stag{font-family:'Share Tech Mono',monospace;font-size:7px;padding:2px 6px;
  border:1px solid rgba(0,245,255,.1);color:var(--t2);}
.pfoot{display:flex;justify-content:space-between;align-items:flex-end;
  padding-top:8px;border-top:1px solid rgba(0,245,255,.06);}
.pprice .am{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--ny);text-shadow:var(--gY);}
.pprice .orig{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--t3);display:block;}
.abtn{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:5px 11px;
  border:1px solid var(--nc);background:transparent;color:var(--nc);cursor:pointer;
  transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.abtn:hover{background:var(--nc);color:var(--bg);}
.pcard.sel .abtn{border-color:var(--np);color:var(--np);}
.pcard.sel .abtn:hover{background:var(--np);color:#fff;}
.rbts{display:flex;gap:4px;margin-top:6px;}
.rbtn{font-family:'Share Tech Mono',monospace;font-size:7px;padding:3px 8px;
  border:1px solid rgba(255,214,10,.2);color:rgba(255,214,10,.6);background:transparent;
  cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:1px;}
.rbtn:hover{border-color:var(--ny);color:var(--ny);}

/* list view */
.pgrid.lv .pcard{clip-path:none;display:grid;grid-template-columns:110px 1fr;}
.pgrid.lv .piw{height:auto;min-height:110px;border-bottom:none;border-right:1px solid rgba(0,245,255,.06);}
.pgrid.lv .pcard.sel::after{right:12px;top:10px;}

/* ── RIGHT ── */
.right{display:flex;flex-direction:column;background:rgba(0,0,0,.3);
  border-left:1px solid rgba(0,245,255,.08);}
.rh{padding:20px 18px 14px;border-bottom:1px solid rgba(0,245,255,.08);}
.rh-t{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--np);
  text-shadow:var(--gP);margin-bottom:10px;}
.rign{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(0,245,255,.18);
  color:var(--t1);font-family:'Orbitron',monospace;font-size:15px;font-weight:700;
  padding:6px 0;outline:none;letter-spacing:2px;}
.rign::placeholder{color:var(--t3);}
.rign:focus{border-bottom-color:var(--nc);}

.compat{padding:9px 18px;border-bottom:1px solid rgba(0,245,255,.06);}
.compat-h{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t2);
  margin-bottom:5px;display:flex;justify-content:space-between;}
.compat-h .cp{color:var(--ng);text-shadow:0 0 8px var(--ng);}
.ct{height:3px;background:rgba(255,255,255,.05);}
.cf{height:100%;background:linear-gradient(90deg,var(--nc),var(--ng));transition:width .6s ease;box-shadow:0 0 7px var(--nc);}

.perfs{padding:9px 18px;border-bottom:1px solid rgba(0,245,255,.06);}
.pbr{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.pbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--t2);width:52px;flex-shrink:0;}
.pbt{flex:1;height:3px;background:rgba(255,255,255,.04);
  clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);}
.pbf{height:100%;transition:width .8s ease;}
.pbf.g{background:linear-gradient(90deg,var(--nc),var(--ng));}
.pbf.w{background:linear-gradient(90deg,var(--np),var(--ny));}
.pbf.s{background:linear-gradient(90deg,var(--npurp),var(--nc));}
.pbv{font-family:'Orbitron',monospace;font-size:9px;color:var(--t2);width:30px;text-align:right;}

.pwr{padding:7px 18px;border-bottom:1px solid rgba(0,245,255,.06);
  display:flex;justify-content:space-between;align-items:center;}
.pwl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t2);}
.pwv{font-family:'Orbitron',monospace;font-size:12px;color:var(--ny);text-shadow:var(--gY);}

.bslots{flex:1;overflow-y:auto;padding:9px 18px;}
.bslots::-webkit-scrollbar{width:3px;}
.bslots::-webkit-scrollbar-thumb{background:var(--np);}
.bcat{margin-bottom:8px;}
.bcl{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--t3);
  text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.bcl .ic{color:var(--nc);font-size:10px;}
.bslot{background:rgba(0,245,255,.02);border:1px solid rgba(0,245,255,.06);
  padding:7px 10px;display:flex;align-items:center;min-height:38px;gap:7px;
  position:relative;overflow:hidden;transition:all .3s;}
.bslot.f{border-color:rgba(0,245,255,.18);background:rgba(0,245,255,.04);}
.bslot.f::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--nc);box-shadow:var(--gC);}
.sth{width:26px;height:26px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.set{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--t3);letter-spacing:1px;}
.sn{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:var(--t1);
  flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp{font-family:'Orbitron',monospace;font-size:10px;color:var(--ny);white-space:nowrap;flex-shrink:0;}
.srm{background:none;border:none;color:rgba(255,0,110,.4);cursor:pointer;
  font-size:11px;padding:0 2px;transition:color .2s;flex-shrink:0;}
.srm:hover{color:var(--np);}

.bfoot{padding:14px 18px;background:rgba(0,0,0,.2);border-top:1px solid rgba(0,245,255,.08);}
.tr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.tl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--t2);}
.tp{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;
  background:linear-gradient(135deg,var(--ny),var(--np));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(255,214,10,.4));}
.ta{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t2);display:block;margin-bottom:12px;}
.abt{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ab{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:2px;
  padding:11px 7px;border:none;cursor:pointer;transition:all .3s;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.sv{background:transparent;border:1px solid var(--nc);color:var(--nc);}
.sv:hover{background:rgba(0,245,255,.08);box-shadow:var(--gC);}
.ex{background:linear-gradient(135deg,var(--np),#800040);color:#fff;box-shadow:0 0 14px rgba(255,0,110,.2);}
.ex:hover{box-shadow:0 0 30px rgba(255,0,110,.5);transform:translateY(-1px);}
.sh{grid-column:1;background:transparent;border:1px solid rgba(191,95,255,.35);color:var(--npurp);font-size:7px;}
.sh:hover{background:rgba(191,95,255,.08);}
.cl{grid-column:2;background:transparent;border:1px solid rgba(255,0,110,.18);color:rgba(255,0,110,.45);font-size:7px;}
.cl:hover{border-color:var(--np);color:var(--np);}

/* Modal */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;
  backdrop-filter:blur(6px);align-items:center;justify-content:center;}
.mov.on{display:flex;}
.modal{background:var(--panel);border:1px solid var(--nc);
  box-shadow:var(--gC),0 20px 80px rgba(0,0,0,.9);max-width:640px;width:92%;
  max-height:88vh;overflow-y:auto;position:relative;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
  animation:mIn .28s ease;}
@keyframes mIn{from{transform:scale(.88) translateY(16px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:var(--nc);}
.mcls{position:absolute;top:12px;right:12px;background:none;border:1px solid rgba(255,0,110,.4);
  color:var(--np);width:26px;height:26px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.mcls:hover{background:rgba(255,0,110,.1);}
.miw{width:100%;height:210px;background:linear-gradient(135deg,#050b18,#0a1428);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border-bottom:1px solid rgba(0,245,255,.1);position:relative;}
.miw::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,245,255,.06) 0%,transparent 65%);pointer-events:none;}
.mi{max-height:180px;max-width:88%;object-fit:contain;filter:drop-shadow(0 8px 22px rgba(0,0,0,.7));}
.mbody{padding:22px 26px;}
.mbi{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--nc);margin-bottom:5px;}
.mbn{font-family:'Orbitron',monospace;font-size:19px;font-weight:700;line-height:1.2;margin-bottom:12px;}
.msg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;}
.ms{background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.08);padding:8px 11px;}
.msk{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.msv{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--t1);}
.mfr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.mp{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:var(--ny);text-shadow:var(--gY);}
.mps{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t2);display:block;margin-top:2px;}
.mad{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;
  padding:12px 24px;border:none;background:linear-gradient(135deg,var(--nc),#006080);
  color:var(--bg);cursor:pointer;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:all .3s;box-shadow:var(--gC);}
.mad:hover{transform:scale(1.04);}
.mad.rm{background:linear-gradient(135deg,var(--np),#800040);}
.mrl{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
.mra{font-family:'Share Tech Mono',monospace;font-size:9px;padding:6px 14px;
  border:1px solid rgba(255,214,10,.3);color:rgba(255,214,10,.8);
  background:transparent;cursor:pointer;text-decoration:none;transition:all .2s;}

// ── CURRENCY ──────────────────────────────────────────────
const CURR={
  USD:{sym:'$',rate:1},
  INR:{sym:'₹',rate:84.5},
  EUR:{sym:'€',rate:0.92},
  GBP:{sym:'£',rate:0.79},
  JPY:{sym:'¥',rate:149.5}
};
let currCode='USD';

function fmtP(usd){
  const c=CURR[currCode],v=usd*c.rate;
  if(currCode==='JPY') return c.sym+Math.round(v).toLocaleString();
  if(currCode==='INR') return c.sym+Math.round(v).toLocaleString('en-IN');
  return c.sym+v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtAlt(usd){
  const tot=usd;
  return currCode!=='USD'?`$${tot.toFixed(2)} USD`:`≈ ₹${Math.round(tot*84.5).toLocaleString('en-IN')} INR`;
}

function setCurr(c){
  currCode=c;
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.cbtn.${c.toLowerCase()}`).classList.add('on');

const CAT={cpu:{ico:'⚡',lbl:'CPU'},gpu:{ico:'🖥',lbl:'GPU'},mobo:{ico:'🔲',lbl:'MOTHERBOARD'},
  ram:{ico:'💾',lbl:'RAM'},storage:{ico:'💿',lbl:'STORAGE'},psu:{ico:'🔌',lbl:'PSU'},
  case:{ico:'🖤',lbl:'CASE'},cooling:{ico:'❄',lbl:'COOLING'},monitor:{ico:'📺',lbl:'MONITOR'},
  keyboard:{ico:'⌨',lbl:'KEYBOARD'},mouse:{ico:'🖱',lbl:'MOUSE'},headset:{ico:'🎧',lbl:'HEADSET'}};
const TM={ultra:'t-ultra',high:'t-high',mid:'t-mid',entry:'t-entry'};
const TL={ultra:'ULTRA',high:'HIGH-END',mid:'MID-RANGE',entry:'BUDGET'};

let curCat='cpu', viewMode='grid', sel={}, modPart=null;

function swCat(cat,btn){
  curCat=cat;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('srch').value='';
  render();
}

function setView(v){
  viewMode=v;
  document.getElementById('pgrid').className='pgrid'+(v==='list'?' lv':'');
  document.getElementById('vG').classList.toggle('on',v==='grid');
  document.getElementById('vL').classList.toggle('on',v==='list');
}

function render(){
  const grid=document.getElementById('pgrid');
  const srch=document.getElementById('srch').value.toLowerCase();
  const sort=document.getElementById('fsort').value;
  const tier=document.getElementById('ftier').value;
  const pmin=parseFloat(document.getElementById('pMin').value)||0;
  const pmax=parseFloat(document.getElementById('pMax').value)||Infinity;

  let parts=(DB[curCat]||[]).filter(p=>
    (p.name.toLowerCase().includes(srch)||p.brand.toLowerCase().includes(srch))
    && p.p>=pmin && p.p<=pmax
    && (!tier||p.tier===tier)
  );

  if(sort==='pa') parts.sort((a,b)=>a.p-b.p);
  else if(sort==='pd') parts.sort((a,b)=>b.p-a.p);
  else if(sort==='n') parts.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='r') parts.sort((a,b)=>b.r-a.r);

  document.getElementById('rcnt').innerHTML=`<b>${parts.length}</b> components`;

  grid.innerHTML=parts.map((p,i)=>{
    const isSel=sel[curCat]?.id===p.id;
    const stars='★'.repeat(p.r)+'☆'.repeat(5-p.r);
    const specs=Object.values(p.specs).slice(0,3).map(v=>`<span class="stag">${v}</span>`).join('');
    const sc=p.stock==='low'?'s-low':'s-in';
    const sl=p.stock==='low'?'LOW STOCK':'IN STOCK';
    return `<div class="pcard${isSel?' sel':''}" style="animation-delay:${i*.025}s" onclick="openMod('${p.id}')">
      <div class="piw">
        <img class="pimg" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="piph" style="display:none">${CAT[curCat].ico}</div>
        <span class="tbadge ${TM[p.tier]}">${TL[p.tier]}</span>
        <div class="sdot"><span class="${sc}"></span>${sl}</div>
      </div>
      <div class="pbody">
        <div class="pbrand">${p.brand}</div>
        <div class="pname">${p.name}</div>
        <div class="prating">${stars}</div>
        <div class="pspecs">${specs}</div>
        <div class="pfoot">
          <div class="pprice">
            <span class="am">${fmtP(p.p)}</span>
            <span class="orig">${currCode!=='USD'?'$'+p.p+' USD':''}</span>
          </div>
          <button class="abtn" onclick="event.stopPropagation();togPart('${p.id}','${curCat}')">${isSel?'REMOVE':'+ ADD'}</button>
        </div>
        ${p.amz?`<div class="rbts" onclick="event.stopPropagation()"><a class="rbtn" href="${p.amz}" target="_blank" rel="noopener">AMAZON ↗</a></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function togPart(id,cat){
  const all=Object.values(DB).flat();
  const p=all.find(x=>x.id===id);
  if(!p) return;
  if(sel[cat]?.id===id){delete sel[cat];showToast('REMOVED FROM BUILD');}
  else{sel[cat]=p;showToast(`${p.name.toUpperCase()} → BUILD`);}
  render(); renderBuild();
}

function openMod(id){
  const all=Object.values(DB).flat();
  const p=all.find(x=>x.id===id);
  if(!p) return;
  const cat=Object.entries(DB).find(([c,arr])=>arr.some(x=>x.id===id))?.[0];
  const isSel=sel[cat]?.id===id;
  modPart={...p,cat};
  document.getElementById('mI').src=p.img||'';
  document.getElementById('mI').style.display='';
  document.getElementById('mIp').style.display='none';
  document.getElementById('mIp').textContent=CAT[cat]?.ico||'🖥';
  document.getElementById('mBrand').textContent=p.brand;
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mTier').innerHTML=`<span class="tbadge ${TM[p.tier]}" style="display:inline-block">${TL[p.tier]}</span>`;
  document.getElementById('mSpecs').innerHTML=Object.entries(p.specs).map(([k,v])=>
    `<div class="ms"><div class="msk">${k}</div><div class="msv">${v}</div></div>`).join('');
  document.getElementById('mPrice').textContent=fmtP(p.p);
  document.getElementById('mPsub').textContent=currCode!=='USD'?`$${p.p} USD`:`≈ ₹${Math.round(p.p*84.5).toLocaleString('en-IN')} INR`;
  const btn=document.getElementById('mABtn');
  btn.textContent=isSel?'✕ REMOVE FROM BUILD':'+ ADD TO BUILD';
  btn.className='mad'+(isSel?' rm':'');
  document.getElementById('mLinks').innerHTML=p.amz?`<a class="mra" href="${p.amz}" target="_blank" rel="noopener">🛒 AMAZON</a>`:'';
  document.getElementById('mov').classList.add('on');
}

function addFromMod(){if(modPart){togPart(modPart.id,modPart.cat);closeMod();}}
function closeMov(e){if(e.target===document.getElementById('mov'))closeMod();}
function closeMod(){document.getElementById('mov').classList.remove('on');modPart=null;}

function renderBuild(){
  const html=Object.entries(CAT).map(([cat,{ico,lbl}])=>{
    const p=sel[cat];
    if(p) return `<div class="bcat">
      <div class="bcl"><span class="ic">${ico}</span>${lbl}</div>
      <div class="bslot f">
        <img class="sth" src="${p.img||''}" alt="" onerror="this.style.display='none'">
        <span class="sn" title="${p.brand} ${p.name}">${p.name}</span>
        <span class="sp">${fmtP(p.p)}</span>
        <button class="srm" onclick="removePart('${cat}')">✕</button>
      </div>
    </div>`;
    return `<div class="bcat">
      <div class="bcl"><span class="ic">${ico}</span>${lbl}</div>
      <div class="bslot"><span class="set">— SELECT COMPONENT —</span></div>
    </div>`;
  }).join('');
  document.getElementById('bslots').innerHTML=html;

  const usd=Object.values(sel).reduce((s,p)=>s+p.p,0);
  document.getElementById('totP').textContent=fmtP(usd);
  document.getElementById('totA').textContent=fmtAlt(usd);
  document.getElementById('hTotal').textContent=fmtP(usd);
  document.getElementById('hParts').textContent=Object.keys(sel).length;

  const watt=Object.values(sel).reduce((s,p)=>s+(p.w||0),0);
  document.getElementById('pwV').textContent=watt?`${watt} W`:'— W';

  const cpu=sel['cpu'],gpu=sel['gpu'];
  if(cpu||gpu){
    const n=(cpu&&gpu)?2:1;
    const g=Math.round(((cpu?.pg||0)+(gpu?.pg||0))/n);
    const w=Math.round(((cpu?.pw||0)+(gpu?.pw||0))/n);
    const s=Math.round(((cpu?.ps||0)+(gpu?.ps||0))/n);
    document.getElementById('pG').style.width=g+'%'; document.getElementById('pGv').textContent=g?g+'%':'—';
    document.getElementById('pW').style.width=w+'%'; document.getElementById('pWv').textContent=w?w+'%':'—';
    document.getElementById('pS').style.width=s+'%'; document.getElementById('pSv').textContent=s?s+'%':'—';
  }else{
    ['pG','pW','pS'].forEach(id=>document.getElementById(id).style.width='0%');
    ['pGv','pWv','pSv'].forEach(id=>document.getElementById(id).textContent='—');
  }
}

function removePart(cat){delete sel[cat];render();renderBuild();showToast('REMOVED');}
function clearBuild(){sel={};render();renderBuild();showToast('BUILD CLEARED');}

function saveBuild(){
  const name=document.getElementById('rigName').value||'MY RIG';
  try{localStorage.setItem('nb_'+Date.now(),JSON.stringify({name,parts:sel,curr:currCode}));}catch(e){}
  showToast('BUILD SAVED — '+name.toUpperCase());
}

function exportBuild(){
  const c=CURR[currCode];
  const name=document.getElementById('rigName').value||'NEON RIG';
  const usd=Object.values(sel).reduce((s,p)=>s+p.p,0);
  let txt=`╔══════════════════════════════════════════════════╗\n║  NEON//BUILD — ${name.toUpperCase().padEnd(33)}║\n╚══════════════════════════════════════════════════╝\n\n`;
  Object.entries(CAT).forEach(([cat,{lbl}])=>{
    const p=sel[cat];
    if(p) txt+=`${lbl.padEnd(16)} ${(p.brand+' '+p.name).padEnd(44)} ${fmtP(p.p)}\n`;
  });
  txt+=`\n${'─'.repeat(62)}\nTOTAL (${currCode}): ${fmtP(usd)}\nTOTAL (USD): $${usd.toFixed(2)}\nTOTAL (INR): ₹${Math.round(usd*84.5).toLocaleString('en-IN')}\n`;
  const b=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='neon-build.txt';a.click();
  showToast('BUILD EXPORTED');
}

function shareBuild(){
  const parts=Object.values(sel).map(p=>p.brand+' '+p.name).join(' | ');
  if(navigator.clipboard) navigator.clipboard.writeText(`${document.getElementById('rigName').value||'NEON RIG'}: ${parts}`);
  showToast('COPIED TO CLIPBOARD');
}

let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent='// '+msg;t.classList.add('on');
  toastTimer=setTimeout(()=>t.classList.remove('on'),2600);
}

render(); renderBuild();
</script>
